services:
  - type: web
    name: sichuan-snow-peaks
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ADMIN_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: WECHAT_PAY_MCH_ID
        sync: false
      - key: WECHAT_PAY_APP_ID
        sync: false
      - key: WECHAT_PAY_CERT_SERIAL_NO
        sync: false
      - key: WECHAT_PAY_API_V3_KEY
        sync: false
      - key: WECHAT_PAY_PRIVATE_KEY
        sync: false
      - key: ALIPAY_APP_ID
        sync: false
      - key: ALIPAY_PRIVATE_KEY
        sync: false
      - key: ALIPAY_PUBLIC_KEY
        sync: false
      - key: ALIPAY_GATEWAY
        value: https://openapi.alipay.com/gateway.do
      - key: SHOPIFY_DEPOSIT_250_URL
        value: https://sk0uvj-g2.myshopify.com/cart/49165438550268:1
      - key: SHOPIFY_DEPOSIT_300_URL
        value: https://sk0uvj-g2.myshopify.com/cart/49165438484732:1
    disk:
      name: snow-peaks-data
      mountPath: /data
      sizeGB: 1
